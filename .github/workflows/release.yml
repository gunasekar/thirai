name: Release APK

# Builds a signed release APK. Push a version tag (e.g. v0.1.0) to also publish
# it to a GitHub Release, or run manually (workflow_dispatch) to just build and
# download it from the run's artifacts.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create/attach to Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags, so Gradle can derive the version

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Write signing config from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64" || { echo "::error::KEYSTORE_BASE64 secret is missing"; exit 1; }
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Provide the show-source URL for BuildConfig
        env:
          THIRAI_SHOWS_URL: ${{ secrets.THIRAI_SHOWS_URL }}
        run: |
          # Optional: seed the default source into the build. Absent, the app
          # starts with no default and the source is set in-app.
          echo "export THIRAI_SHOWS_URL=\"$THIRAI_SHOWS_URL\"" > .env

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Name the APK by version
        id: apk
        run: |
          # Same source of truth as the build: the git tag (v0.2.0 → 0.2.0).
          VER=$(git describe --tags --always | sed 's/^v//')
          cp app/build/outputs/apk/release/app-release.apk "thirai-$VER.apk"
          echo "file=thirai-$VER.apk" >> "$GITHUB_OUTPUT"

      - name: Verify it is signed
        env:
          APK_FILE: ${{ steps.apk.outputs.file }}
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --print-certs "$APK_FILE"
          else
            echo "apksigner not found on runner; skipping explicit verify"
          fi

      - name: Clean up signing material
        if: always()
        run: rm -f keystore.properties "$RUNNER_TEMP/release.keystore" .env

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.apk.outputs.file }}
          path: ${{ steps.apk.outputs.file }}
          if-no-files-found: error

      - name: Publish to GitHub Release (tags only)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          APK_FILE: ${{ steps.apk.outputs.file }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            && gh release upload "$GITHUB_REF_NAME" "$APK_FILE" --clobber \
            || gh release create "$GITHUB_REF_NAME" "$APK_FILE" \
                 --title "$GITHUB_REF_NAME" --notes "Signed release APK built by CI."
